name: BuildAndPack
on:
  push:
    branches: [release]
    tags: ['*']
  pull_request:

jobs:
  build-and-publish:
    permissions:
      contents: read
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: build
        run: |
          WrapGenerator\Build.ps1 -PackageNuget
